# RTKLIB rnx2rtkp 2.4.2-p13 - C+D Phase 1 oracle: PASA00ESP rover against
# SCOA00FRA base on 2026-04-30 DOY 120, 10:00-12:00 GPST. This is the
# dual-frequency static variant with ANTEX receiver PCV and solid earth tides
# on. It uses continuous AR because the Phase 1 spec only pins fix-and-hold for
# the L1 variant. The public BKG IGS0OPSFIN final SP3/CLK product for this day
# is GPS-only, so navsys is intentionally GPS-only even though the vendored
# observations and broadcast nav are multi-GNSS.
pos1-posmode       =static
pos1-frequency     =l1+l2
pos1-soltype       =forward
pos1-elmask        =15
pos1-snrmask_r     =off
pos1-snrmask_b     =off
pos1-dynamics      =off
pos1-tidecorr      =on
pos1-ionoopt       =dual-freq
pos1-tropopt       =saas
pos1-sateph        =precise
pos1-posopt1       =on
pos1-posopt2       =on
pos1-posopt3       =off
pos1-posopt4       =off
pos1-posopt5       =off
pos1-navsys        =1
pos2-armode        =continuous
pos2-gloarmode     =off
pos2-bdsarmode     =off
pos2-arthres       =3.0
pos2-arlockcnt     =0
pos2-arelmask      =0
pos2-elmaskhold    =0
pos2-aroutcnt      =5
pos2-arminfix      =10
pos2-slipthres     =0.05
pos2-maxage        =30
pos2-syncsol       =off
pos2-rejionno      =30
pos2-rejgdop       =30
pos2-niter         =1
out-solformat      =enu
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =hms
out-timendec       =3
out-height         =ellipsoidal
out-solstatic      =all
ant1-postype       =single
ant1-anttype       =LEIAR20         LEIM
ant1-antdele       =0
ant1-antdeln       =0
ant1-antdelu       =0
ant2-postype       =xyz
ant2-pos1          =4639940.429559
ant2-pos2          =-136224.811560
ant2-pos3          =4359552.502780
ant2-anttype       =TRM55971.00     NONE
ant2-antdele       =0
ant2-antdeln       =0
ant2-antdelu       =0
file-satantfile    =../../antex/igs20_pasa_scoa_gps.atx
file-rcvantfile    =../../antex/igs20_pasa_scoa_gps.atx
