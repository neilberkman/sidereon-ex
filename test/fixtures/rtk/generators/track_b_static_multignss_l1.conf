# RTKLIB rnx2rtkp 2.4.2 — Track B oracle: STATIC multi-constellation on the
# WTZR/WTZZ pair. Identical to the canonical `l1_brdc_fix_and_hold` processing
# EXCEPT pos1-navsys GPS-only -> GPS+GLONASS+Galileo+BeiDou, run against the
# G/R/E/C broadcast nav fixture that actually contains GLONASS records. GLONASS
# remains float-only (gloarmode=off): FDMA inter-channel biases break the clean
# DD integer assumption, so GLONASS contributes to the float solution but not AR.
# Rover = WTZZ, Base = WTZR (ARP reference position below = canonical ref pos).
pos1-posmode       =static
pos1-frequency     =l1
pos1-soltype       =forward
pos1-elmask        =15
pos1-snrmask       =0
pos1-dynamics      =off
pos1-tidecorr      =off
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-navsys        =45         # <-- 1:GPS + 4:GLO + 8:GAL + 32:BDS (the changed variable)
pos2-armode        =fix-and-hold
pos2-gloarmode     =off        # GLONASS float-only: excluded from ambiguity resolution
pos2-arthres       =3
pos2-arlockcnt     =0
pos2-arelmask      =0
pos2-aroutcnt      =5
pos2-arminfix      =10
pos2-slipthres     =0.05
pos2-maxage        =30
pos2-rejionno      =30
pos2-niter         =1
out-solformat      =enu
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =hms
out-timendec       =3
out-height         =ellipsoidal
out-solstatic      =all
ant1-postype       =single
ant2-postype       =llh
ant2-pos1          =49.144200524
ant2-pos2          =12.878913935
ant2-pos3          =666.0917
ant2-antdele       =0
ant2-antdeln       =0
ant2-antdelu       =0
