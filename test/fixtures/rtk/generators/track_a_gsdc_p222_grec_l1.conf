# RTKLIB demo5 rnx2rtkp EX 2.5.0 - Track A moving-rover oracle on
# GSDC 2022 train/2021-08-24-US-SVL-1/GooglePixel5.
# Rover = phone RINEX, base = NOAA CORS P222, nav = BKG combined BRDC G/R/E/C.
# Started from track_a_kinematic_gps_l1.conf, then moved to the demo5 phone
# defaults needed for smartphone data. The default AR ratio gate is documented
# in PROVENANCE.md; this is a phone-grade oracle, not a survey-grade reference.

pos1-posmode       =kinematic
pos1-frequency     =l1
pos1-soltype       =combined
pos1-elmask        =15
pos1-snrmask_r     =off
pos1-snrmask_b     =off
pos1-snrmask_L1    =38,38,38,38,38,38,38,38,38
pos1-dynamics      =on
pos1-tidecorr      =0
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-exclsats      =
pos1-navsys        =45

pos2-armode        =fix-and-hold
pos2-gloarmode     =off
pos2-bdsarmode     =on
pos2-arfilter      =off
pos2-arthres       =3.0
pos2-arthresmin    =3.0
pos2-arthresmax    =3.0
pos2-arthres1      =0.1
pos2-arthres2      =0
pos2-arthres3      =1e-05
pos2-arthres4      =0.0001
pos2-arlockcnt     =0
pos2-minfixsats    =4
pos2-minholdsats   =5
pos2-mindropsats   =10
pos2-varholdamb    =0.1
pos2-gainholdamb   =0.01
pos2-arelmask      =0
pos2-arminfix      =10
pos2-armaxiter     =1
pos2-elmaskhold    =0
pos2-aroutcnt      =5

pos2-maxage        =30
pos2-syncsol       =off
pos2-slipthres     =0.05
pos2-rejionno      =30
pos2-rejcode       =10
pos2-dopthres      =0
pos2-niter         =1
pos2-baselen       =0
pos2-basesig       =0

out-solformat      =xyz
out-outhead        =on
out-outopt         =on
out-outvel         =off
out-timesys        =gpst
out-timeform       =hms
out-timendec       =3
out-degform        =deg
out-fieldsep       =
out-outsingle      =off
out-maxsolstd      =0
out-height         =ellipsoidal
out-geoid          =internal
out-solstatic      =all
out-nmeaintv1      =0
out-nmeaintv2      =0
out-outstat        =residual

stats-eratio1      =300
stats-errphase     =0.003
stats-errphaseel   =0.003
stats-errphasebl   =0
stats-errdoppler   =1
stats-snrmax       =52
stats-errsnr       =0
stats-errrcv       =0
stats-stdbias      =30
stats-stdiono      =0.03
stats-stdtrop      =0.3
stats-prnaccelh    =3
stats-prnaccelv    =1
stats-prnbias      =0.0001
stats-prniono      =0.001
stats-prntrop      =0.0001
stats-prnpos       =0
stats-clkstab      =5e-12

ant1-postype       =single
ant1-pos1          =0
ant1-pos2          =0
ant1-pos3          =0
ant1-anttype       =
ant1-antdele       =0
ant1-antdeln       =0
ant1-antdelu       =0
ant2-postype       =rinexhead
ant2-pos1          =0
ant2-pos2          =0
ant2-pos3          =0
ant2-anttype       =
ant2-antdele       =0
ant2-antdeln       =0
ant2-antdelu       =0
ant2-maxaveep      =1
ant2-initrst       =off

misc-timeinterp    =on
misc-sbasatsel     =0
misc-rnxopt1       =
misc-rnxopt2       =

file-satantfile    =
file-rcvantfile    =
file-staposfile    =
file-geoidfile     =
file-ionofile      =
file-dcbfile       =
file-eopfile       =
file-blqfile       =
file-tempdir       =
file-geexefile     =
file-solstatfile   =
file-tracefile     =
