# RTKLIB rnx2rtkp 2.4.2 — Track A oracle: KINEMATIC-mode on the static
# WTZR/WTZZ pair. Identical to the canonical `l1_brdc_fix_and_hold` reference
# EXCEPT pos1-posmode static->kinematic. Truth is the known static antenna
# baseline; this gates the kinematic process/time-update path, not motion.
# Rover = WTZZ, Base = WTZR (ARP reference position below = canonical ref pos).
pos1-posmode       =kinematic  # <-- the single changed variable vs the static reference
pos1-frequency     =l1
pos1-soltype       =forward
pos1-elmask        =15
pos1-snrmask       =0
pos1-dynamics      =off
pos1-tidecorr      =off
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-navsys        =1          # GPS only (isolate the kinematic variable)
pos2-armode        =fix-and-hold
pos2-gloarmode     =off
pos2-arthres       =3
pos2-arlockcnt     =0
pos2-arelmask      =0
pos2-aroutcnt      =5
pos2-arminfix      =10
pos2-slipthres     =0.05
pos2-maxage        =30
pos2-rejionno      =30
pos2-niter         =1
out-solformat      =enu
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =hms
out-timendec       =3
out-height         =ellipsoidal
out-solstatic      =all
ant1-postype       =single
ant2-postype       =llh
ant2-pos1          =49.144200524
ant2-pos2          =12.878913935
ant2-pos3          =666.0917
ant2-antdele       =0
ant2-antdeln       =0
ant2-antdelu       =0
